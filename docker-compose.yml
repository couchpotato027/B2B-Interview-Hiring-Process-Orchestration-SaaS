version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: sdproject-postgres
    environment:
      POSTGRES_USER: sduser
      POSTGRES_PASSWORD: sdpassword
      POSTGRES_DB: sdproject
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sdproject-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
